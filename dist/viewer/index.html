<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FKLD Viewer</title>
  <style>
    :root {
      --bg: #fafaf6;
      --panel: #fff;
      --border: #d8d3c2;
      --ink: #1d1c19;
      --muted: #777264;
      --ok: #2c7a3d;
      --bad: #b22222;
      /* Edge classes — FOLD convention, extended for FKLD cut subtypes. */
      --mountain: #d24545;
      --valley:   #2666c4;
      --facet:    #c8c5b8;
      --boundary: #1d1c19;
      --unassigned: #aaa5a0;
      --major:    #b22222;
      --minor:    #d97c1c;
      --seam:     #7a3aaa;
      --dart:     #2c7a3d;
      --auxetic:  #1d8a8a;
      --vent:     #c4a01b;
      --tab:      #cb4f9a;
      --perforation: #c4321b;
      --face-top: #e8eef9;   /* CCW-facing side (FOLD cyan) */
      --face-bot: #fff4cd;   /* CW-facing side  (FOLD yellow) */
      --body:     #efe7d2;   /* opaque "full sheet of paper" the cuts sit on */
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 14px; margin: 0; font-weight: 600; }
    header h1 small { color: var(--muted); font-weight: 400; margin-left: 6px; }
    .toolbar {
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex; flex-wrap: wrap; gap: 6px 18px;
      align-items: center;
      font-size: 12px;
    }
    .toolbar > .group { display: flex; gap: 4px; align-items: center; }
    .toolbar > .group > .lbl { color: var(--muted); margin-right: 2px; }
    .toolbar select, .toolbar input[type=file], .toolbar button {
      font: inherit;
      padding: 3px 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      border-radius: 3px;
      cursor: pointer;
    }
    .toolbar button:hover, .toolbar select:hover { background: #f0ecdd; }
    .toolbar label.toggle {
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg);
      cursor: pointer;
      user-select: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .toolbar label.toggle.on { background: #2666c4; border-color: #1c4d99; color: white; }
    .toolbar label.toggle input { display: none; }
    .toolbar #prop-data {
      max-width: 480px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: var(--muted);
    }
    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      height: calc(100vh - 53px - 38px);  /* header + toolbar */
    }
    main.no-sidebar { grid-template-columns: 1fr 0; }
    .canvas-wrap {
      position: relative;
      background:
        linear-gradient(45deg, #f4f1e4 25%, transparent 25%) 0 0 / 16px 16px,
        linear-gradient(-45deg, #f4f1e4 25%, transparent 25%) 0 8px / 16px 16px,
        linear-gradient(45deg, transparent 75%, #f4f1e4 75%) 8px -8px / 16px 16px,
        linear-gradient(-45deg, transparent 75%, #f4f1e4 75%) -8px 0px / 16px 16px,
        var(--bg);
      overflow: hidden;
      cursor: grab;
    }
    .canvas-wrap.dragging { cursor: grabbing; }
    svg { width: 100%; height: 100%; display: block; user-select: none; }
    aside {
      background: var(--panel);
      border-left: 1px solid var(--border);
      padding: 14px 18px;
      overflow-y: auto;
      font-size: 12px;
    }
    main.no-sidebar aside { display: none; }
    aside h2 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin: 16px 0 4px; font-weight: 600;
    }
    aside h2:first-child { margin-top: 0; }
    aside .row {
      display: flex; justify-content: space-between;
      padding: 1px 0; border-bottom: 1px dotted var(--border);
    }
    aside .row .label { color: var(--muted); }
    aside .row .value { font-variant-numeric: tabular-nums; }
    aside pre {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; padding: 6px;
      font-size: 10px; line-height: 1.4;
      overflow-x: auto; margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .pill {
      display: inline-block; padding: 0 5px; border-radius: 8px;
      font-size: 10px; line-height: 16px;
      background: var(--bg); border: 1px solid var(--border);
    }
    .pill.ok { background: #e3f2e8; border-color: var(--ok); color: var(--ok); }
    .pill.bad { background: #fbe5e3; border-color: var(--bad); color: var(--bad); }
    .swatch { display: inline-block; width: 18px; height: 2px; vertical-align: middle; margin-right: 4px; }
    .swatch.dashed { background: repeating-linear-gradient(90deg, currentColor 0, currentColor 2px, transparent 2px, transparent 4px); }
    .legend-item { display: flex; align-items: center; padding: 1px 0; font-size: 10px; }
    #status {
      color: var(--muted); font-size: 11px; padding: 3px 16px;
      background: var(--panel); border-top: 1px solid var(--border);
    }
    /* All SVG primitives use vector-effect: non-scaling-stroke so the
       stroke widths and dasharrays below are interpreted in CSS pixels,
       not viewBox user units. Without this the stroke widths balloon to
       the viewBox scale and a thin "5 2" dashed line becomes a 5-units
       black blob bigger than the entire viewport. */
    svg polygon, svg line, svg circle, svg path { vector-effect: non-scaling-stroke; }
    /* Opaque full-sheet silhouette drawn beneath the (optional) translucent faces, so dart/vent
       gaps read as slits in a solid body of paper rather than see-through holes. */
    svg .body-fill { stroke: none; fill: var(--body); fill-opacity: 1; }
    svg .face { stroke: none; fill-opacity: 0.45; }
    svg .face.top { fill: var(--face-top); }
    svg .face.bot { fill: var(--face-bot); }
    svg .face-text {
      fill: var(--muted); font-size: 9px; text-anchor: middle;
      font-family: ui-monospace, monospace;
      paint-order: stroke; stroke: white; stroke-width: 2;
    }
    svg .vert-text {
      fill: var(--ink); font-size: 9px; text-anchor: middle;
      font-family: ui-monospace, monospace;
      paint-order: stroke; stroke: white; stroke-width: 2;
    }
    svg .vert { stroke: var(--ink); stroke-width: 0.8; }
    svg .vert.positive { fill: #d24545; }
    svg .vert.negative { fill: #2666c4; }
    svg .vert.flat { fill: #fff; }
    svg .vert.boundary { fill: #1d1c19; }
    svg .vert.unset { fill: #c8c5b8; }
    svg .edge { fill: none; stroke-linecap: round; stroke-width: 1.5; }
    svg .edge.M { stroke: var(--mountain); stroke-dasharray: 6 3; }
    svg .edge.V { stroke: var(--valley);   stroke-dasharray: 3 3; }
    svg .edge.F { stroke: var(--facet); stroke-width: 0.8; }
    svg .edge.B { stroke: var(--boundary); stroke-width: 2; }
    svg .edge.U { stroke: var(--unassigned); }
    svg .edge.C { stroke: var(--bad); stroke-width: 2.5; }
    svg .edge.C.major       { stroke: var(--major); }
    svg .edge.C.minor       { stroke: var(--minor); }
    svg .edge.C.seam        { stroke: var(--seam); stroke-dasharray: 6 3; }
    svg .edge.C.dart        { stroke: var(--dart); }
    svg .edge.C.auxetic     { stroke: var(--auxetic); }
    svg .edge.C.vent        { stroke: var(--vent); }
    svg .edge.C.tab         { stroke: var(--tab); }
    svg .edge.C.perforation { stroke: var(--perforation); stroke-dasharray: 3 2; }
  </style>
</head>
<body>
  <header>
    <h1>FKLD Viewer <small>— SVG renderer for any .fkld / .fold file, with 3D rotation</small></h1>
  </header>

  <div class="toolbar">
    <div class="group" id="toggle-group">
      <span class="lbl">Toggle:</span>
      <!-- toggles inserted by JS -->
    </div>
    <div class="group">
      <span class="lbl">View:</span>
      <button data-view="x">x</button>
      <button data-view="y">y</button>
      <button data-view="z">z</button>
    </div>
    <div class="group">
      <span class="lbl">Zoom:</span>
      <button id="zoom-in"  title="Zoom in (+ or =)">+</button>
      <button id="zoom-out" title="Zoom out (- or _)">−</button>
      <button id="zoom-fit" title="Fit to view (0)">Fit</button>
    </div>
    <div class="group">
      <span class="lbl">Example:</span>
      <select id="example-select"></select>
    </div>
    <div class="group">
      <span class="lbl">Import:</span>
      <input type="file" id="file-input" accept=".fkld,.fold,.json">
    </div>
    <div class="group">
      <span class="lbl">Property:</span>
      <select id="prop-select"><option>--</option></select>
      <span id="prop-data"></span>
    </div>
    <div class="group" style="margin-left:auto">
      <button id="toggle-sidebar">Toggle sidebar</button>
    </div>
  </div>

  <main>
    <div class="canvas-wrap" id="canvas-wrap"><svg id="canvas"></svg></div>
    <aside id="sidebar"></aside>
  </main>
  <div id="status">
    <span id="status-text">Ready.</span>
    <span style="margin-left:14px;color:var(--muted)">Zoom: <span id="zoom-pill" class="pill" style="margin-left:2px">100%</span></span>
    <span style="margin-left:14px;color:var(--muted)">Drag: rotate · Shift-drag / right-drag: pan · Wheel: zoom · +/− /0 keys</span>
  </div>

  <script>
  // ===========================================================================
  // FKLD Viewer — mirrors FOLD's foldviewer.html UX:
  //   • Toggle: Faces / Edges / Vertices / Face Text   (+ FKLD: Cuts, Molecules, Curvature)
  //   • View: x / y / z axis snap buttons
  //   • Example: dropdown of bundled files
  //   • Import: pick a local .fkld / .fold / .json
  //   • Property: explore any key on the loaded file
  //   • Mouse-drag to rotate the camera (FOLD-style)
  // ===========================================================================

  const NS = 'http://www.w3.org/2000/svg';

  // The bundled examples are inlined later by examples/scripts/embed-example.coffee
  // so the viewer is fully usable from a file:// URL.
  const EMBEDDED = {};

  // ---- linear algebra (mirrors FOLD's geom for what we need) ---------------
  const sub = (a, b) => [a[0]-b[0], a[1]-b[1], a[2]-b[2]];
  const add = (a, b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]];
  const mul = (a, k) => [a[0]*k, a[1]*k, a[2]*k];
  const dot = (a, b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
  const cross = (a, b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
  const mag = a => Math.hypot(...a);
  const unit = a => { const m = mag(a); return m ? mul(a, 1/m) : [0,0,0]; };
  const rotate = (v, axis, angle) => {
    // Rodrigues' rotation formula. axis is unit.
    const c = Math.cos(angle), s = Math.sin(angle);
    return add(add(mul(v, c), mul(cross(axis, v), s)), mul(axis, dot(axis, v) * (1 - c)));
  };

  // ---- camera ---------------------------------------------------------------
  const cam = {
    c: [0,0,0],      // center
    x: [1,0,0],      // right
    y: [0,1,0],      // up
    z: [0,0,1],      // out
    r: 1,            // half-extent
    last: null,
  };
  function setCamAxes(x, y) { cam.x = x; cam.y = y; cam.z = cross(x, y); }
  function project(p) {
    const q = mul(sub(p, cam.c), 1/cam.r);
    return [dot(q, cam.x), -dot(q, cam.y), 0];   // SVG y points down
  }

  // ---- state ----------------------------------------------------------------
  const layers = {
    'Full body': { on: true },     // opaque paper silhouette so cuts read as slits, not holes
    Faces:     { on: true },
    Edges:     { on: true },
    Vertices:  { on: false },
    'Face Text': { on: false },
    Cuts:      { on: true },        // colour C edges by subtype
    Molecules: { on: false },       // overlay θ labels
    Curvature: { on: false },       // colour vertices by class
  };
  let currentFile = null;

  function setStatus(msg, level = '') {
    const el = document.getElementById('status-text');
    if (!el) return;
    el.textContent = msg;
    el.style.color = level === 'bad' ? 'var(--bad)' :
                     level === 'ok'  ? 'var(--ok)'  : 'var(--muted)';
  }

  // ---- model build: derive vs/es/fs from a parsed FKLD/FOLD file -----------
  function buildModel(file) {
    const vs = (file.vertices_coords || []).map((c, i) => ({
      i, cs: [c[0] || 0, c[1] || 0, c[2] || 0],
    }));
    const fs = (file.faces_vertices || []).map((face, i) => ({
      i, vs: face.map(j => vs[j]),
    }));
    // Per-face centroid + normal (for face ordering during 3D rotation).
    for (const f of fs) {
      const n = f.vs.length;
      f.c = [0,0,0];
      for (const v of f.vs) f.c = add(f.c, v.cs);
      f.c = mul(f.c, 1/n);
      if (n >= 3) {
        // Newell's method gives a stable normal even for non-planar polys.
        let nrm = [0,0,0];
        for (let k = 0; k < n; k++) {
          const a = f.vs[k].cs, b = f.vs[(k+1) % n].cs;
          nrm = add(nrm, [
            (a[1]-b[1]) * (a[2]+b[2]),
            (a[2]-b[2]) * (a[0]+b[0]),
            (a[0]-b[0]) * (a[1]+b[1]),
          ]);
        }
        f.n = unit(nrm);
      } else f.n = [0,0,1];
    }
    const ev = file.edges_vertices || [];
    const ea = file.edges_assignment || [];
    const ec = file['fkld:edges_cutType'] || [];
    const es = ev.map((e, i) => ({
      i, v1: vs[e[0]], v2: vs[e[1]],
      assign: ea[i] || 'U',
      cutType: ec[i] || null,
    }));
    return { vs, fs, es };
  }

  // ---- bounding-box framing for the camera ---------------------------------
  function frameModel(model) {
    if (!model.vs.length) return;
    let min = [...model.vs[0].cs], max = [...min];
    for (const v of model.vs) for (let i = 0; i < 3; i++) {
      min[i] = Math.min(min[i], v.cs[i]);
      max[i] = Math.max(max[i], v.cs[i]);
    }
    cam.c = mul(add(min, max), 0.5);
    cam.r = Math.max(mag(sub(max, min)) / 2 * 1.05, 1e-3);
  }

  // ---- rendering ------------------------------------------------------------
  function render() {
    if (!currentFile) return;
    const svg = document.getElementById('canvas');
    svg.innerHTML = '';
    svg.setAttribute('viewBox', '-1 -1 2 2');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    const model = buildModel(currentFile);
    if (!model.vs.length) {
      setStatus('No vertices_coords in file.', 'bad');
      return;
    }
    // Project every vertex; face centroids too.
    for (const v of model.vs) v.p = project(v.cs);
    for (const f of model.fs) f.p = project(f.c);

    // Sort faces by signed depth (back to front) along the camera's z axis.
    const faceDepth = f => -dot(sub(f.c, cam.c), cam.z);
    model.fs.sort((a, b) => faceDepth(a) - faceDepth(b));

    // Full body: every face as one opaque paper silhouette beneath the rest, so the kirigamized
    // sheet reads as a complete body and dart/vent gaps appear as slits, not see-through holes.
    if (layers['Full body'].on) {
      for (const f of model.fs) {
        if (f.vs.length < 3) continue;
        const poly = document.createElementNS(NS, 'polygon');
        poly.setAttribute('points', f.vs.map(v => v.p.slice(0,2).join(',')).join(' '));
        poly.setAttribute('class', 'body-fill');
        svg.appendChild(poly);
      }
    }
    // Faces.
    if (layers.Faces.on) {
      for (const f of model.fs) {
        if (f.vs.length < 3) continue;
        const facing = dot(f.n, cam.z) > 0 ? 'top' : 'bot';
        const poly = document.createElementNS(NS, 'polygon');
        poly.setAttribute('points', f.vs.map(v => v.p.slice(0,2).join(',')).join(' '));
        poly.setAttribute('class', `face ${facing}`);
        svg.appendChild(poly);
      }
    }
    if (layers['Face Text'].on) {
      for (const f of model.fs) {
        const t = document.createElementNS(NS, 'text');
        t.setAttribute('x', f.p[0]); t.setAttribute('y', f.p[1]);
        t.setAttribute('class', 'face-text');
        t.textContent = `f${f.i}`;
        svg.appendChild(t);
      }
    }
    // Edges. Stroke widths come entirely from CSS — non-scaling-stroke
    // keeps them in screen pixels regardless of viewBox or rotation. Cuts (C) are drawn LAST
    // (stable sort) so every performed cut sits on top of the body fill and the other creases.
    if (layers.Edges.on) {
      const ordered = [...model.es].sort((a, b) => (a.assign === 'C' ? 1 : 0) - (b.assign === 'C' ? 1 : 0));
      for (const e of ordered) {
        const line = document.createElementNS(NS, 'line');
        line.setAttribute('x1', e.v1.p[0]); line.setAttribute('y1', e.v1.p[1]);
        line.setAttribute('x2', e.v2.p[0]); line.setAttribute('y2', e.v2.p[1]);
        let cls = `edge ${e.assign}`;
        // FKLD: subtype refinement for C edges.
        if (layers.Cuts.on && e.assign === 'C' && e.cutType) {
          cls += ` ${e.cutType}`;
        }
        line.setAttribute('class', cls);
        const title = document.createElementNS(NS, 'title');
        let t = `edge ${e.i}: ${e.assign}`;
        if (e.cutType) t += ` (${e.cutType})`;
        const theta = currentFile['fkld:edges_moleculeTheta']?.[e.i];
        const w = currentFile['fkld:edges_moleculeWidth']?.[e.i];
        if (theta != null) t += `\nθ = ${theta.toFixed(3)} rad`;
        if (w != null) t += `\nw = ${w.toFixed(3)}`;
        const at = currentFile['fkld:edges_actuationType']?.[e.i];
        if (at) t += `\nactuation: ${at}`;
        title.textContent = t;
        line.appendChild(title);
        svg.appendChild(line);
      }
    }
    // Molecule labels (optional).
    if (layers.Molecules.on) {
      const thetas = currentFile['fkld:edges_moleculeTheta'] || [];
      for (const e of model.es) {
        const theta = thetas[e.i];
        if (theta == null) continue;
        const m = mul(add(e.v1.p, e.v2.p), 0.5);
        const t = document.createElementNS(NS, 'text');
        t.setAttribute('x', m[0]); t.setAttribute('y', m[1]);
        t.setAttribute('class', 'vert-text');
        t.setAttribute('dy', -0.005);
        t.textContent = `θ=${theta.toFixed(2)}`;
        svg.appendChild(t);
      }
    }
    // Vertices.
    if (layers.Vertices.on) {
      const cls = currentFile['fkld:vertices_curvatureClass'] || [];
      for (const v of model.vs) {
        const c = document.createElementNS(NS, 'circle');
        c.setAttribute('cx', v.p[0]); c.setAttribute('cy', v.p[1]);
        c.setAttribute('r', 0.018);
        const k = layers.Curvature.on ? (cls[v.i] || 'unset') : 'flat';
        c.setAttribute('class', `vert ${k}`);
        const title = document.createElementNS(NS, 'title');
        let t = `vertex ${v.i}`;
        if (cls[v.i]) t += `\nclass: ${cls[v.i]}`;
        const def = currentFile['fkld:vertices_angleDefect']?.[v.i];
        if (def != null) t += `\nangle defect: ${def.toFixed(4)} rad`;
        title.textContent = t;
        c.appendChild(title);
        svg.appendChild(c);

        const tx = document.createElementNS(NS, 'text');
        tx.setAttribute('x', v.p[0]); tx.setAttribute('y', v.p[1] + 0.005);
        tx.setAttribute('class', 'vert-text');
        tx.textContent = `${v.i}`;
        svg.appendChild(tx);
      }
    }
  }

  // ---- toggles bar ----------------------------------------------------------
  function buildToggles() {
    const g = document.getElementById('toggle-group');
    for (const name of Object.keys(layers)) {
      const label = document.createElement('label');
      label.className = 'toggle' + (layers[name].on ? ' on' : '');
      label.textContent = name;
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = layers[name].on;
      cb.addEventListener('change', () => {
        layers[name].on = cb.checked;
        label.classList.toggle('on', cb.checked);
        render();
      });
      label.prepend(cb);
      g.appendChild(label);
    }
  }

  // ---- sidebar --------------------------------------------------------------
  function drawSidebar(file) {
    const a = document.getElementById('sidebar');
    const v = file.vertices_coords?.length || 0;
    const f = file.faces_vertices?.length || 0;
    const e = file.edges_vertices?.length || 0;
    const ah = {};
    for (const x of (file.edges_assignment || [])) ah[x] = (ah[x] || 0) + 1;
    const ch = {};
    for (const x of (file['fkld:edges_cutType'] || [])) if (x) ch[x] = (ch[x] || 0) + 1;
    const vh = {};
    for (const x of (file['fkld:vertices_curvatureClass'] || [])) if (x) vh[x] = (vh[x] || 0) + 1;
    const thetas = file['fkld:edges_moleculeTheta'] || [];
    const molCount = thetas.filter(x => x != null).length;
    const matIds = file['fkld:faces_materialId'] || [];
    const matSet = [...new Set(matIds.filter(x => x))];

    const kirigami = file['fkld:meta_kirigami'];
    const arch = file['fkld:meta_architecture'];

    let html = `
      <h2>File</h2>
      <div class="row"><span class="label">creator</span><span class="value">${escape(file.file_creator) ?? '—'}</span></div>
      <div class="row"><span class="label">frame_title</span><span class="value">${escape(file.frame_title) ?? '—'}</span></div>
      <div class="row"><span class="label">unit</span><span class="value">${file.frame_unit ?? '—'}</span></div>
      <div class="row"><span class="label">attributes</span><span class="value">${(file.frame_attributes || []).join(', ') || '—'}</span></div>
      <div class="row"><span class="label">FKLD spec</span><span class="value">${file['fkld:meta_fkldSpec'] || '—'}</span></div>

      <h2>Topology</h2>
      <div class="row"><span class="label">vertices</span><span class="value">${v}</span></div>
      <div class="row"><span class="label">faces</span><span class="value">${f}</span></div>
      <div class="row"><span class="label">edges</span><span class="value">${e}</span></div>

      <h2>Edge assignments</h2>
      ${Object.entries(ah).map(([k,n]) => `<div class="row"><span class="label">${k}</span><span class="value">${n}</span></div>`).join('') || '<div class="row" style="border:none;color:var(--muted)"><em>none</em></div>'}

      <h2>Cut subtypes</h2>
      ${Object.keys(ch).length ? Object.entries(ch).map(([k,n]) => `<div class="row"><span class="label">${k}</span><span class="value">${n}</span></div>`).join('') : '<div class="row" style="border:none;color:var(--muted)"><em>none</em></div>'}

      <h2>Vertex curvature</h2>
      ${Object.keys(vh).length ? Object.entries(vh).map(([k,n]) => `<div class="row"><span class="label">${k}</span><span class="value">${n}</span></div>`).join('') : '<div class="row" style="border:none;color:var(--muted)"><em>not recorded</em></div>'}

      <h2>Molecules</h2>
      <div class="row"><span class="label">edges with θ + w</span><span class="value">${molCount}</span></div>
      ${molCount > 0 ? `<div class="row"><span class="label">θ range (rad)</span><span class="value">${(() => { const xs = thetas.filter(x => x != null); return `${Math.min(...xs).toFixed(3)} – ${Math.max(...xs).toFixed(3)}`; })()}</span></div>` : ''}

      <h2>Materials</h2>
      ${matSet.length ? matSet.map(id => `<div class="row"><span class="label">${id}</span><span class="value">${matIds.filter(x => x === id).length} faces</span></div>`).join('') : '<div class="row" style="border:none;color:var(--muted)"><em>none</em></div>'}
    `;
    if (kirigami) {
      html += `<h2>Universal kirigami</h2><pre>${escape(JSON.stringify(kirigami, null, 2))}</pre>`;
    }
    if (arch) {
      html += `<h2>Architecture extension</h2><pre>${escape(JSON.stringify(arch, null, 2))}</pre>`;
    }
    const problems = clientValidate(file);
    html += `<h2>Validation</h2>`;
    if (problems.length === 0) {
      html += `<div class="row" style="border:none"><span class="value"><span class="pill ok">passed</span> <span style="color:var(--muted)">0 problems</span></span></div>`;
    } else {
      html += `<div class="row" style="border:none"><span class="value"><span class="pill bad">${problems.length} issues</span></span></div>`;
      html += `<pre>${escape(problems.slice(0, 15).map(p => '• ' + p).join('\n'))}${problems.length > 15 ? '\n…' : ''}</pre>`;
    }
    // Legend.
    html += `<h2>Legend</h2>`;
    html += `<div class="legend-item"><span class="swatch" style="height:10px;background:var(--body);border:1px solid var(--border)"></span>full body (paper)</div>`;
    html += [
      ['mountain (M)', 'mountain', true, '5 2'],
      ['valley (V)',   'valley',   true, '2 2'],
      ['facet (F)',    'facet',    false, ''],
      ['boundary (B)', 'boundary', false, ''],
    ].map(([t, k, dash]) => `<div class="legend-item"><span class="swatch ${dash ? 'dashed' : ''}" style="background:${dash ? '' : `var(--${k})`};color:var(--${k})"></span>${t}</div>`).join('');
    for (const [k, label] of [['major','major'], ['minor','minor'], ['seam','seam (dashed)'], ['dart','dart'], ['auxetic','auxetic'], ['vent','vent'], ['tab','tab'], ['perforation','perforation (dotted)']]) {
      html += `<div class="legend-item"><span class="swatch" style="background:var(--${k})"></span>${label}</div>`;
    }
    a.innerHTML = html;
  }
  const escape = (s) => s == null ? s : String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  function clientValidate(file) {
    const p = [];
    if (!file) return ['file is null'];
    const numV = file.vertices_coords?.length;
    const numE = file.edges_vertices?.length;
    const numF = file.faces_vertices?.length;
    const dims = {
      'fkld:edges_cutType': numE, 'fkld:edges_moleculeTheta': numE,
      'fkld:edges_moleculeWidth': numE, 'fkld:edges_moleculeDepth': numE,
      'fkld:edges_dihedralTarget': numE, 'fkld:edges_actuationType': numE,
      'fkld:edges_actuationParam': numE,
      'fkld:vertices_curvatureClass': numV, 'fkld:vertices_angleDefect': numV,
      'fkld:vertices_reliefStrategy': numV,
      'fkld:faces_materialId': numF, 'fkld:faces_thickness': numF,
      'fkld:faces_structuralRole': numF, 'fkld:faces_panelId': numF,
    };
    for (const [k, expected] of Object.entries(dims)) {
      const arr = file[k];
      if (Array.isArray(arr) && expected != null && arr.length > expected) {
        p.push(`${k}: length ${arr.length} > expected ${expected}`);
      }
    }
    const ea = file.edges_assignment || [];
    const ec = file['fkld:edges_cutType'] || [];
    const validSubs = new Set(['major','minor','seam','dart','auxetic','vent','tab','perforation']);
    for (let i = 0; i < ec.length; i++) {
      if (ec[i] == null) continue;
      if (!validSubs.has(ec[i])) p.push(`edge ${i}: unknown cut subtype "${ec[i]}"`);
      if (ea[i] !== 'C') p.push(`edge ${i}: cutType="${ec[i]}" but assignment="${ea[i] ?? 'undefined'}"`);
    }
    const ts = file['fkld:edges_moleculeTheta'] || [];
    for (let i = 0; i < ts.length; i++) {
      const t = ts[i];
      if (t == null) continue;
      if (!Number.isFinite(t)) { p.push(`edge ${i}: moleculeTheta not finite`); continue; }
      if (Math.abs(t) >= Math.PI) p.push(`edge ${i}: moleculeTheta=${t} violates −π < θ < π`);
    }
    return p;
  }

  // ---- property explorer ----------------------------------------------------
  function buildPropertySelect(file) {
    const sel = document.getElementById('prop-select');
    sel.innerHTML = '';
    const opt0 = document.createElement('option'); opt0.textContent = '--'; opt0.value = '';
    sel.appendChild(opt0);
    for (const k of Object.keys(file)) {
      const o = document.createElement('option');
      o.value = k; o.textContent = k;
      sel.appendChild(o);
    }
  }
  function updatePropertyData() {
    const sel = document.getElementById('prop-select');
    const data = document.getElementById('prop-data');
    const k = sel.value;
    if (!k || !currentFile) { data.textContent = ''; return; }
    const v = currentFile[k];
    const len = Array.isArray(v) ? `${v.length} elements: ` : '';
    data.textContent = len + JSON.stringify(v);
  }

  // ---- file loading ---------------------------------------------------------
  function loadObject(file, sourceName) {
    currentFile = file;
    frameModel(buildModel(file));
    baseRadius = cam.r;             // record natural framing for the zoom pill
    setCamAxes([1,0,0], [0,1,0]);   // default z-view
    render();
    drawSidebar(file);
    buildPropertySelect(file);
    setStatus(`Loaded: ${sourceName}`, 'ok');
    updateZoomPill();
    // Report the model now on screen back to the Kirigamizer host, so the 3D Sim folds exactly
    // what the viewer shows — regardless of how it was loaded (host postMessage, file picker,
    // example dropdown, or drag-and-drop).
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'kirigamizer:viewer-loaded', fkld: file, name: sourceName }, '*');
    }
  }
  function loadJsonString(text, name) {
    try {
      loadObject(JSON.parse(text), name);
    } catch (err) {
      setStatus(`Parse error in ${name}: ${err.message}`, 'bad');
    }
  }
  function loadFromFile(file) {
    setStatus(`Reading ${file.name}…`);
    const r = new FileReader();
    r.onload = () => loadJsonString(r.result, file.name);
    r.readAsText(file);
  }
  async function loadFromUrl(url) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      loadJsonString(await resp.text(), url);
    } catch (err) {
      setStatus(`Fetch ${url} failed: ${err.message}. Using embedded copy if available.`, 'bad');
    }
  }
  function loadExample(key) {
    const inlined = EMBEDDED[key];
    if (inlined) {
      try {
        loadObject(JSON.parse(inlined), key);
      } catch (err) {
        setStatus(`Embedded ${key} parse error: ${err.message}`, 'bad');
      }
    } else {
      loadFromUrl(key);
    }
  }

  // ---- event wiring ---------------------------------------------------------
  buildToggles();

  document.getElementById('file-input').addEventListener('change', (e) => {
    if (e.target.files[0]) loadFromFile(e.target.files[0]);
  });

  // ---- Kirigamizer host bridge --------------------------------------------
  // The Kirigamizer shell embeds this viewer in an <iframe> and hands it a
  // model with postMessage: { type:'kirigamizer:load', fkld, name } where
  // `fkld` is either a JSON string or a parsed FKLD/FOLD object.
  window.addEventListener('message', (e) => {
    const msg = e.data;
    if (!msg || msg.type !== 'kirigamizer:load') return;
    const name = msg.name || 'kirigamizer-model';
    if (typeof msg.fkld === 'string') loadJsonString(msg.fkld, name);
    else if (msg.fkld) loadObject(msg.fkld, name);
  });
  // Announce readiness so the host can flush any queued model.
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'kirigamizer:viewer-ready' }, '*');
  }

  document.body.addEventListener('dragover', (e) => e.preventDefault());
  document.body.addEventListener('drop', (e) => {
    e.preventDefault();
    if (e.dataTransfer.files[0]) loadFromFile(e.dataTransfer.files[0]);
  });
  document.querySelectorAll('button[data-view]').forEach(b => {
    b.addEventListener('click', () => {
      const v = b.dataset.view;
      // FOLD convention:  x-view = look along +x → x-axis points right (y world), y-axis points up (z world)
      if (v === 'x') setCamAxes([0,1,0], [0,0,1]);
      if (v === 'y') setCamAxes([0,0,1], [1,0,0]);
      if (v === 'z') setCamAxes([1,0,0], [0,1,0]);
      render();
    });
  });
  document.getElementById('toggle-sidebar').addEventListener('click', () => {
    document.querySelector('main').classList.toggle('no-sidebar');
  });
  document.getElementById('prop-select').addEventListener('change', updatePropertyData);

  // ---- mouse rotation + pan + wheel zoom ----------------------------------
  const wrap = document.getElementById('canvas-wrap');
  // Track the "natural" framing radius set by frameModel(), so the zoom level
  // pill in the status bar means something useful (100% = freshly framed).
  let baseRadius = 1;

  // Convert a mouse event over the canvas into a world-space point on the
  // camera plane (the plane through cam.c perpendicular to cam.z). Used so
  // wheel-zoom can keep the point under the cursor fixed.
  function mouseWorld(e) {
    const rect = wrap.getBoundingClientRect();
    const dim = Math.min(rect.width, rect.height);
    // Normalised device coordinates: −1 … 1 along the viewBox.
    const ndcX =  (e.clientX - rect.left  - rect.width  / 2) / (dim / 2);
    const ndcY = -(e.clientY - rect.top   - rect.height / 2) / (dim / 2);
    // Inverse of project(): world = cam.c + cam.r * (ndcX·cam.x + ndcY·cam.y)
    return add(cam.c, mul(add(mul(cam.x, ndcX), mul(cam.y, ndcY)), cam.r));
  }
  function ndcOf(e) {
    const rect = wrap.getBoundingClientRect();
    const dim = Math.min(rect.width, rect.height);
    return [
       (e.clientX - rect.left  - rect.width  / 2) / (dim / 2),
      -(e.clientY - rect.top   - rect.height / 2) / (dim / 2),
    ];
  }

  function zoom(factor, anchorEvent) {
    let anchorWorld = null, ndc = null;
    if (anchorEvent) {
      anchorWorld = mouseWorld(anchorEvent);
      ndc = ndcOf(anchorEvent);
    }
    cam.r = Math.max(cam.r * factor, 1e-6);
    if (anchorWorld) {
      // Keep `anchorWorld` projecting to the same ndc after the zoom: solve
      //   anchorWorld = newC + newR · (ndcX·cam.x + ndcY·cam.y)
      // for newC.
      const target = mul(add(mul(cam.x, ndc[0]), mul(cam.y, ndc[1])), cam.r);
      cam.c = sub(anchorWorld, target);
    }
    render();
    updateZoomPill();
  }
  function fitToView() {
    if (!currentFile) return;
    frameModel(buildModel(currentFile));
    baseRadius = cam.r;
    render();
    updateZoomPill();
  }
  function updateZoomPill() {
    const pct = baseRadius ? Math.round((baseRadius / cam.r) * 100) : 100;
    document.getElementById('zoom-pill').textContent = `${pct}%`;
  }

  // Mouse drag: left button rotates (FOLD-style); shift-drag (or middle / right
  // button) pans. We use `e.buttons` so the gesture is unambiguous on mousemove.
  let dragMode = null;     // 'rotate' | 'pan' | null
  wrap.addEventListener('mousedown', (e) => {
    cam.last = [e.clientX, e.clientY];
    dragMode = (e.shiftKey || e.button === 1 || e.button === 2) ? 'pan' : 'rotate';
    wrap.classList.add('dragging');
  });
  wrap.addEventListener('contextmenu', (e) => e.preventDefault());
  window.addEventListener('mousemove', (e) => {
    if (!cam.last) return;
    const p = [e.clientX, e.clientY];
    const d = sub([...p, 0], [...cam.last, 0]);
    cam.last = p;
    if (mag(d) === 0) return;
    if (dragMode === 'pan') {
      // Mouse delta in pixels → world delta along cam.x / cam.y.
      const rect = wrap.getBoundingClientRect();
      const dim = Math.min(rect.width, rect.height);
      const scale = (2 * cam.r) / dim;
      // Drag right → world moves right → camera moves left (subtract).
      cam.c = sub(cam.c, add(mul(cam.x, d[0] * scale), mul(cam.y, -d[1] * scale)));
    } else {
      const axis = unit(add(mul(cam.x, -d[1]), mul(cam.y, -d[0])));
      if (mag(axis) === 0) return;
      const angle = mag(d) * 0.008;
      setCamAxes(rotate(cam.x, axis, angle), rotate(cam.y, axis, angle));
    }
    render();
  });
  window.addEventListener('mouseup', () => {
    cam.last = null;
    dragMode = null;
    wrap.classList.remove('dragging');
  });

  // Wheel zoom anchored on the cursor (Cmd/Ctrl/Alt+wheel falls through to
  // the browser, in case the user wants to scroll the page).
  wrap.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
    zoom(factor, e);
  }, { passive: false });

  // Toolbar zoom buttons.
  document.getElementById('zoom-in').addEventListener('click',  () => zoom(1 / 1.25));
  document.getElementById('zoom-out').addEventListener('click', () => zoom(1.25));
  document.getElementById('zoom-fit').addEventListener('click', fitToView);

  // Keyboard shortcuts: + / − / 0 (ignored while typing in a form field).
  window.addEventListener('keydown', (e) => {
    if (e.target.matches('input, select, textarea')) return;
    if (e.key === '+' || e.key === '=') { zoom(1 / 1.25); e.preventDefault(); }
    if (e.key === '-' || e.key === '_') { zoom(1.25);     e.preventDefault(); }
    if (e.key === '0')                  { fitToView();    e.preventDefault(); }
  });

  // ---- example dropdown ----------------------------------------------------
  function populateExamples() {
    const sel = document.getElementById('example-select');
    const examples = [
      ['Kirigami flap — cut-out tab (FKLD)',  '../examples/kirigami-flap.fkld'],
      ['AKDE hexagonal kirigami N=6 (FKLD)',  '../examples/akde-hex.fkld'],
      ['AKDE decagon kirigami N=10 (FKLD)',  '../examples/akde-decagon-pyramid.fkld'],
      ['AKDE square pyramid (FKLD)',    'akde-square-pyramid'],
      ['RES Square Tower — Miyamoto, faithful OS import (FKLD)',  '../examples/res-square-tower.fkld'],
      ['RES Square Tower — Miyamoto, line-only erecting (FKLD)',  '../examples/res-square-tower-erect.fkld'],
      ['House + door — kirigamized solid, hinge joints (FKLD)',  '../examples/house-door.fkld'],
      ['House — kirigamized gable box (FKLD)',  '../examples/house.fkld'],
      ['Barn — monitor-roof, kirigamized (FKLD)',  '../examples/barn.fkld'],
      ['Hotel — false-front + balcony porch (FKLD)',  '../examples/hotel.fkld'],
      ['General store — arched false front (FKLD)',  '../examples/general-store.fkld'],
      ['Saloon — false front + balcony, double-bay doors (FKLD)',  '../examples/saloon.fkld'],
      ['Corner saloon — chamfered corner, wraparound balcony (FKLD)',  '../examples/corner-saloon.fkld'],
      ['Simple 3D fold (FOLD)',         'simple'],
      ['Box folding (FOLD)',            'box'],
      ['Square twist crease (FOLD)',    'squaretwist'],
      ['Diagonal CP (FOLD)',            'diagonal-cp'],
      ['Diagonal folded (FOLD)',        'diagonal-folded'],
    ];
    for (const [label, key] of examples) {
      const o = document.createElement('option');
      o.value = key; o.textContent = label;
      sel.appendChild(o);
    }
    sel.addEventListener('change', () => loadExample(sel.value));
    // Auto-load the first example.
    loadExample(examples[0][1]);
  }

  // Bootstrap.
  populateExamples();
  </script>
